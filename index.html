<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICU Monitor</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0f1c, #0f1a2f);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  color: #00d9ff;
  letter-spacing: 1px;
}

/* ROOM BUTTONS */
.rooms {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.room-btn {
  padding: 12px 25px;
  border-radius: 10px;
  background: rgba(0,217,255,0.1);
  border: 1px solid #00d9ff;
  color: #00d9ff;
  cursor: pointer;
  transition: 0.3s;
}

.room-btn:hover {
  background: #00d9ff;
  color: black;
}

/* CARD */
.card {
  max-width: 520px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 30px rgba(0,217,255,0.15);
  backdrop-filter: blur(10px);
}

/* TITLE */
.room-title {
  text-align: center;
  color: #00d9ff;
  margin-bottom: 5px;
}

.name {
  text-align: center;
  font-size: 20px;
  margin-bottom: 20px;
}

/* HR BIG */
.hr {
  text-align: center;
  font-size: 70px;
  font-weight: bold;
  color: #00d9ff;
}

/* BPM label */
.bpm {
  text-align: center;
  color: #aaa;
  margin-bottom: 25px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.box {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.label {
  font-size: 12px;
  color: #aaa;
}

.value {
  font-size: 22px;
  font-weight: bold;
}

/* STATUS */
.status {
  text-align: center;
  margin-top: 20px;
  font-size: 18px;
}

.normal { color: #2ecc71; }
.warning { color: #f1c40f; }
.critical { color: #e74c3c; }

/* BLINK */
.blink {
  animation: blink 1s infinite;
}
@keyframes blink {
  50% { opacity: 0; }
}
</style>

</head>

<body>

<div class="header">ICU Monitoring System</div>

<div class="rooms">
  <div class="room-btn" onclick="selectRoom(101)">Room 101</div>
  <div class="room-btn" onclick="selectRoom(102)">Room 102</div>
</div>

<div id="data"></div>

<script>
let currentRoom = null;

function selectRoom(id) {
  currentRoom = id;
  update();
}

async function update() {
  if (!currentRoom) return;

  const res = await fetch('/room/' + currentRoom);
  const d = await res.json();

  if (!d) return;

  let statusClass = (d.status || "Normal").toLowerCase();
  let blinkClass = d.status === "Critical" ? "blink" : "";

  document.getElementById("data").innerHTML = `
    <div class="card">

      <div class="room-title">Room ${currentRoom}</div>
      <div class="name">${d.name}</div>

      <div class="hr">${d.hr}</div>
      <div class="bpm">BPM</div>

      <div class="grid">
        <div class="box">
          <div class="label">SpO2</div>
          <div class="value">${d.spo2}%</div>
        </div>

        <div class="box">
          <div class="label">Body Temp</div>
          <div class="value">${d.bodyTemp} °C</div>
        </div>

        <div class="box">
          <div class="label">Humidity</div>
          <div class="value">${d.humidity}%</div>
        </div>

        <div class="box">
          <div class="label">Water Level</div>
          <div class="value">${d.water}</div>
        </div>
      </div>

      <div class="status ${statusClass} ${blinkClass}">
        ${d.status}
      </div>

    </div>
  `;
}

setInterval(update, 2000);
</script>

</body>
</html>
