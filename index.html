<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICU Monitor</title>
</head>

<body>

<h1>ICU Monitoring</h1>

<div id="data"></div>

<script>
async function update() {
  const res = await fetch('/room/101');
  const d = await res.json();

  document.getElementById("data").innerHTML = `
    <p>Name: ${d.name}</p>
    <p>HR: ${d.hr}</p>
    <p>SpO2: ${d.spo2}</p>
    <p>Body Temp: ${d.bodyTemp}</p>
    <p>Room Temp: ${d.roomTemp}</p>
    <p>Humidity: ${d.humidity}</p>
    <p>Water: ${d.water}</p>
    <p>Motion: ${d.motion}</p>
    <p>BP: ${d.bp}</p>
    <p>Status: ${d.status}</p>
  `;
}

setInterval(update, 2000);
update();
</script>

</body>
</html>
