<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICU Monitor</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0a0f1c, #111a2e);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 25px;
  font-size: 28px;
  font-weight: bold;
  color: #00d9ff;
}

/* ROOM BUTTONS */
.room-container {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.room-btn {
  padding: 15px 30px;
  border-radius: 12px;
  background: rgba(0,217,255,0.1);
  border: 1px solid #00d9ff;
  color: #00d9ff;
  cursor: pointer;
  transition: 0.3s;
}

.room-btn:hover {
  background: #00d9ff;
  color: black;
}

/* CARD */
.card {
  max-width: 500px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 30px rgba(0,217,255,0.15);
  backdrop-filter: blur(10px);
}

/* PATIENT NAME */
.name {
  text-align: center;
  font-size: 22px;
  margin-bottom: 10px;
  color: #ffffff;
}

/* ROOM TITLE */
.room-title {
  text-align: center;
  color: #00d9ff;
  margin-bottom: 20px;
}

/* HR BIG */
.hr {
  text-align: center;
  font-size: 60px;
  color: #00d9ff;
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

/* ITEM */
.item {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 10px;
  text-align: center;
}

.label {
  font-size: 12px;
  color: #aaa;
}

.value {
  font-size: 20px;
  font-weight: bold;
}

/* STATUS */
.status {
  text-align: center;
  margin-top: 20px;
  font-size: 18px;
}

.normal { color: #2ecc71; }
.warning { color: #f1c40f; }
.critical { color: #e74c3c; }

.blink {
  animation: blink 1s infinite;
}
@keyframes blink {
  50% { opacity: 0; }
}
</style>

</head>

<body>

<div class="header">ICU Monitoring System</div>

<div class="room-container">
  <div class="room-btn" onclick="selectRoom(101)">Room 101</div>
  <div class="room-btn" onclick="selectRoom(102)">Room 102</div>
</div>

<div id="data"></div>

<script>
let currentRoom = null;

/* FAKE DATA */
const fakeData = {
  101: {
    name: "Ahmed Ali",
    hr: 85,
    spo2: 97,
    bodyTemp: 36.9,
    humidity: 55,
    water: 70,
    status: "Normal"
  },
  102: {
    name: "Mohamed Hassan",
    hr: 120,
    spo2: 90,
    bodyTemp: 39,
    humidity: 65,
    water: 40,
    status: "Critical"
  }
};

function selectRoom(id) {
  currentRoom = id;
  update();
}

function update() {
  if (!currentRoom) return;

  const d = fakeData[currentRoom];

  let statusClass = d.status.toLowerCase();
  let blinkClass = d.status === "Critical" ? "blink" : "";

  document.getElementById("data").innerHTML = `
    <div class="card">

      <div class="room-title">Room ${currentRoom}</div>
      <div class="name">${d.name}</div>

      <div class="hr">${d.hr}</div>

      <div class="grid">
        <div class="item">
          <div class="label">SpO2</div>
          <div class="value">${d.spo2}%</div>
        </div>

        <div class="item">
          <div class="label">Body Temp</div>
          <div class="value">${d.bodyTemp} °C</div>
        </div>

        <div class="item">
          <div class="label">Humidity</div>
          <div class="value">${d.humidity}%</div>
        </div>

        <div class="item">
          <div class="label">Water Level</div>
          <div class="value">${d.water}</div>
        </div>
      </div>

      <div class="status ${statusClass} ${blinkClass}">
        ${d.status}
      </div>

    </div>
  `;
}

setInterval(update, 2000);
</script>

</body>
</html>
