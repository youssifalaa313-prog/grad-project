<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICU Monitor Pro</title>

<style>
:root{
--bg:#071018;
--panel:#0d1b2a;
--panel2:#10263d;
--line:#1d3a57;
--cyan:#4de7ff;
--green:#22c55e;
--yellow:#facc15;
--red:#ef4444;
--text:#eaf6ff;
--muted:#8aa3ba;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:Segoe UI,Arial,sans-serif;
background:linear-gradient(135deg,#06111d,#0b1d31);
color:var(--text);
}

/* LOGIN */
#loginScreen{
display:flex;
height:100vh;
justify-content:center;
align-items:center;
background:#06111d;
}

.loginBox{
background:#0d1b2a;
padding:30px;
border-radius:12px;
width:300px;
text-align:center;
}

.loginBox input{
width:100%;
padding:10px;
margin:8px 0;
}

.loginBox button{
width:100%;
padding:10px;
background:#4de7ff;
border:none;
cursor:pointer;
font-weight:bold;
}

/* APP */
.wrapper{
min-height:100vh;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
background:var(--panel);
padding:16px 20px;
border-radius:16px;
border:1px solid var(--line);
margin-bottom:18px;
}

.title{font-size:24px;font-weight:700}

.live{display:flex;align-items:center;gap:8px;color:var(--green)}

.dot{
width:10px;height:10px;border-radius:50%;
background:var(--green);
animation:pulse 1.5s infinite;
}

@keyframes pulse{
to{box-shadow:0 0 0 14px rgba(34,197,94,0)}
}

/* HOME */
.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:18px;
padding:18px;
margin-bottom:18px;
}

.homeGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.homeCard{
background:var(--panel2);
border:1px solid var(--line);
padding:16px;
border-radius:14px;
cursor:pointer;
transition:0.3s;
}

.homeCard:hover{
transform:scale(1.03);
background:var(--cyan);
color:#00131c;
}

/* DASHBOARD */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:18px;
}

.patient-name{font-size:30px;font-weight:700}
.sub{color:var(--muted)}

.monitor{
margin-top:18px;
padding:18px;
border-radius:16px;
background:#02070d;
border:1px solid #16324c;
}

.bigHr{font-size:72px;color:var(--cyan);font-weight:800}

svg{width:100%;height:120px;margin-top:10px;}

path{
stroke:#4de7ff;
stroke-width:4;
fill:none;
stroke-dasharray:300;
animation:ecg 1.5s linear infinite;
}

@keyframes ecg{
0%{stroke-dashoffset:300}
100%{stroke-dashoffset:0}
}

.metrics{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
margin-top:18px;
}

.metric{
background:var(--panel2);
padding:16px;
border-radius:14px;
}

.metric .label{color:var(--muted);font-size:13px}
.metric .val{font-size:28px;font-weight:700;margin-top:6px}

/* STATUS */
.status{text-align:center;padding:20px}
.status h2{font-size:30px}

.normal{color:var(--green)}
.warning{color:var(--yellow)}
.critical{color:var(--red)}

.blink{animation:blink 1s infinite}
@keyframes blink{50%{opacity:.4}}

/* BACK */
.back-btn{
margin-bottom:15px;
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
background:var(--cyan);
color:#00131c;
font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="loginBox">
    <h2 style="color:#4de7ff">ICU Login</h2>

    <input id="user" placeholder="Username">

    <div style="position:relative;">
      <input id="pass" type="password" placeholder="Password">
      <span onclick="togglePassword()" style="
        position:absolute;
        right:10px;
        top:50%;
        transform:translateY(-50%);
        cursor:pointer;
        color:#4de7ff;
      ">👁</span>
    </div>

    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
  </div>
</div>

<!-- APP -->
<div class="wrapper" id="app" style="display:none;">

<div class="topbar">
<div class="title">Patient Monitoring Center</div>
<div class="live"><span class="dot"></span>System Online</div>
</div>

<div id="homeScreen" class="card"></div>
<div id="data" style="display:none;"></div>

</div>

<script>

let currentRoom=null;

/* SHOW/HIDE PASSWORD */
function togglePassword(){
  const pass=document.getElementById("pass");
  pass.type = pass.type === "password" ? "text" : "password";
}

/* LOGIN */
async function login(){
  const username=document.getElementById("user").value;
  const password=document.getElementById("pass").value;

  const res=await fetch('/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,password})
  });

  const data=await res.json();

  if(data.success){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";
    renderHome();
  }else{
    document.getElementById("error").innerText="Wrong login";
  }
}

/* LOAD ROOMS */
async function renderHome(){
  const res=await fetch('/rooms');
  const rooms=await res.json();

  let html=`<div class="homeGrid">`;

  for(let room in rooms){
    html+=`
    <div class="homeCard" onclick="openRoom(${room})">
      <h3>Room ${room}</h3>
      <p style="color:#8aa3ba;margin-top:6px">${rooms[room].name}</p>
    </div>`;
  }

  html+=`</div>`;
  document.getElementById("homeScreen").innerHTML=html;
}

/* OPEN ROOM */
function openRoom(id){
  currentRoom=id;
  document.getElementById("homeScreen").style.display="none";
  document.getElementById("data").style.display="block";
  update();
}

/* BACK */
function goHome(){
  currentRoom=null;
  document.getElementById("data").style.display="none";
  document.getElementById("homeScreen").style.display="block";
}

/* UPDATE DATA */
async function update(){
  if(!currentRoom) return;

  const res=await fetch('/room/'+currentRoom);
  const d=await res.json();

  if(d.message){
    document.getElementById("data").innerHTML="<p>No data yet...</p>";
    return;
  }

  const c=d.status.toLowerCase();
  const blink=d.status==='Critical'?'blink':'';

  document.getElementById("data").innerHTML=`
  <button class="back-btn" onclick="goHome()">⬅ Back</button>

  <div class="grid">

  <div class="card">

  <div class="patient-name">${d.name}</div>
  <div class="sub">Room ${currentRoom}</div>

  <div class="monitor">
  <div class="bigHr">${d.hr} BPM</div>

  <svg viewBox="0 0 500 120">
  <path d="M0 70 L50 70 L80 35 L100 95 L130 20 L160 70 L220 70 L250 55 L280 70 L500 70"/>
  </svg>
  </div>

  <div class="metrics">
  <div class="metric"><div class="label">SpO₂</div><div class="val">${d.spo2}%</div></div>
  <div class="metric"><div class="label">Temp</div><div class="val">${d.bodyTemp}°C</div></div>
  <div class="metric"><div class="label">Humidity</div><div class="val">${d.humidity}%</div></div>
  <div class="metric"><div class="label">Water</div><div class="val">${d.water}%</div></div>
  </div>

  </div>

  <div>
  <div class="card status">
  <div class="sub">Status</div>
  <h2 class="${c} ${blink}">${d.status}</h2>
  </div>
  </div>

  </div>
  `;
}

setInterval(update,2000);

</script>

</body>
</html>
