<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ICU Monitor</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f5f7fb;
  color: #1e293b;
}

/* HEADER */
.header {
  text-align: center;
  padding: 25px;
  font-size: 28px;
  font-weight: bold;
  color: #2563eb;
}

/* ROOM BUTTONS */
.rooms {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.room-btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid #dbeafe;
  background: white;
  cursor: pointer;
  transition: 0.3s;
}

.room-btn:hover {
  background: #2563eb;
  color: white;
}

/* CARD */
.card {
  max-width: 550px;
  margin: 40px auto;
  padding: 30px;
  border-radius: 15px;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* TITLE */
.room-title {
  font-size: 18px;
  color: #64748b;
}

.name {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* HR */
.hr {
  text-align: center;
  font-size: 65px;
  font-weight: bold;
  color: #2563eb;
}

.bpm {
  text-align: center;
  color: #64748b;
  margin-bottom: 30px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.box {
  background: #f8fafc;
  padding: 15px;
  border-radius: 10px;
}

.label {
  font-size: 12px;
  color: #64748b;
}

.value {
  font-size: 22px;
  font-weight: bold;
}

/* STATUS */
.status {
  margin-top: 20px;
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  padding: 10px;
  border-radius: 8px;
}

.normal {
  background: #dcfce7;
  color: #16a34a;
}

.warning {
  background: #fef9c3;
  color: #ca8a04;
}

.critical {
  background: #fee2e2;
  color: #dc2626;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.5; }
}
</style>

</head>

<body>

<div class="header">ICU Monitoring System</div>

<div class="rooms">
  <div class="room-btn" onclick="selectRoom(101)">Room 101</div>
  <div class="room-btn" onclick="selectRoom(102)">Room 102</div>
</div>

<div id="data"></div>

<script>
let currentRoom = null;

function selectRoom(id) {
  currentRoom = id;
  update();
}

async function update() {
  if (!currentRoom) return;

  const res = await fetch('/room/' + currentRoom);
  const d = await res.json();

  if (!d) return;

  let statusClass = (d.status || "Normal").toLowerCase();

  document.getElementById("data").innerHTML = `
    <div class="card">

      <div class="room-title">Room ${currentRoom}</div>
      <div class="name">${d.name}</div>

      <div class="hr">${d.hr}</div>
      <div class="bpm">BPM</div>

      <div class="grid">
        <div class="box">
          <div class="label">SpO2</div>
          <div class="value">${d.spo2}%</div>
        </div>

        <div class="box">
          <div class="label">Body Temp</div>
          <div class="value">${d.temp} °C</div>
        </div>

        <div class="box">
          <div class="label">Humidity</div>
          <div class="value">${d.humidity || 40}%</div>
        </div>

        <div class="box">
          <div class="label">Water Level</div>
          <div class="value">${d.water || 70}</div>
        </div>
      </div>

      <div class="status ${statusClass}">
        ${d.status}
      </div>

    </div>
  `;
}

setInterval(update, 2000);
</script>

</body>
</html>
